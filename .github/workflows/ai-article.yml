name: ai-article

# AI活用の記事だけを1本作って公開する(手動実行用)。
# 毎朝の自動2本(チラシ+AI)とは別に、すぐ記事を増やしたいときに使う。
on:
  workflow_dispatch:

concurrency:
  group: daily-article

permissions:
  contents: write

jobs:
  write-ai-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ライブラリを入れる
        run: pip install anthropic pillow
      - name: AI活用の記事を1本作る
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_article.py --ai
      - name: 記事をブログに反映する(push)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts ai_state.json assets/images
          git diff --cached --quiet || git commit -m "Add AI article"
          git pull --rebase
          git push

  deploy:
    needs: write-ai-article
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
