name: daily-article

on:
  # 起動はclaude.aiの定期ルーティン(毎朝5:40 JST)からworkflow_dispatchで行う
  # (GitHub内蔵cronは1〜3時間遅延するため2026-07-21に廃止。6時までに公開するための変更)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "保存せず記事を表示するだけの場合は true"
        required: false
        default: "false"

concurrency:
  group: daily-article

permissions:
  contents: write

jobs:
  write-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: ライブラリを入れる
        run: pip install anthropic pillow
      - name: 記事を3本作る(チラシ集客＋AI活用＋お金・資金繰り)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python generate_article.py --dry-run
            python generate_article.py --ai --dry-run
            python generate_article.py --okane --dry-run
          else
            python generate_article.py
            python generate_article.py --ai
            python generate_article.py --okane
          fi
      - name: 記事をブログに反映する(push)
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts state.json ai_state.json okane_state.json assets/images
          git diff --cached --quiet || git commit -m "Add weekly article"
          git pull --rebase
          git push

  # 記事を追加したら jibulabo.jp/blog/ へ反映する。
  # (GITHUB_TOKENによるpushではpushトリガーが発火しないため、ここから明示的に呼ぶ)
  deploy:
    needs: write-article
    if: ${{ github.event.inputs.dry_run != 'true' }}
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
