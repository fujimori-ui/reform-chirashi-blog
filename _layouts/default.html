<!DOCTYPE html>
<html lang="ja">
<head>

{% seo %}

<link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">

<body>
<header class="site-header">

    <a class="brand" href="https://jibulabo.jp/">

      <a class="navlink" href="{{ '/' | relative_url }}">記事一覧</a>

<main class="wrap{% if page.wide %} wide{% endif %}">

<footer class="site-footer">

      <span class="fbrand-name">JibuLabo</span>
      <span class="fbrand-sub">小さな工務店の、経営の参謀。</span>
